site_name: simplenet
site_description: Python implementation of the TAMU DC modified-Ward network reduction toolbox
site_url: https://immm-sfa.github.io/simplenet/
repo_url: https://github.com/IMMM-SFA/simplenet
repo_name: IMMM-SFA/simplenet
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Algorithm: algorithm.md
  - MATLAB Comparison: matlab-comparison.md
  - CLI Reference: cli.md
  - API Reference:
      - Overview: api/index.md
      - PowerCase (case): api/case.md
      - Pipeline: api/pipeline.md
      - Preprocess: api/preprocess.md
      - Y-matrix: api/ymatrix.md
      - Boundary: api/boundary.md
      - Kron Reduction: api/kron.md
      - Assemble: api/assemble.md
      - Generators: api/generators.md
      - DC Power Flow: api/dcpf.md
      - Load Redistribution: api/redistribute.md
      - I/O - MATPOWER: api/io_matpower.md
      - I/O - XLSX: api/io_xlsx.md
      - I/O - CSV: api/io_csv.md
      - CLI: api/cli.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            filters:
              - "!^_"
          paths: [src]

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IMMM-SFA/simplenet
  version:
    provider: mike
